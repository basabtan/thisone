<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ideas — Sabtan Knowledge Base</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/nav-strip.css"/>
<style>
  :root{
    --ivory:#fbf7ef;--paper:#fffdf8;--paper2:#f5efe3;
    --graphite:#232421;--muted:#4a453c;--soft:#bdb3a0;--line:#ded4c1;
    --blue:#2f5367;--blue-dk:#1e3a4a;
    --copper:#a5643a;--copper-dk:#7d4a28;
    --gold:#b89344;--green:#496f61;
    --teal-bg:#E1F5EE;--teal-fg:#085041;--teal-bd:#0F6E56;
    --amber-bg:#FAEEDA;--amber-fg:#633806;--amber-bd:#854F0B;
    --shadow:0 18px 45px rgba(55,45,30,0.11);
    --shadow-sm:0 6px 16px rgba(55,45,30,0.08);
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    color:var(--graphite);font-family:'Lora',serif;
    background:radial-gradient(circle at top left,rgba(199,167,106,0.22),transparent 32%),
      linear-gradient(135deg,#fffaf0 0%,var(--ivory) 46%,#f1eadb 100%);
    overflow-x:hidden;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.13;
    background-image:repeating-linear-gradient(145deg,transparent 0 18px,rgba(47,83,103,.10) 19px,transparent 20px),
      radial-gradient(circle at 78% 12%,rgba(165,100,58,.18),transparent 24%);mix-blend-mode:multiply;}
  #root{position:relative;z-index:1;min-height:100vh}

  /* ── research / app category switch (topbar) ── */
  .ideas-category-switch{
    position:relative;overflow:visible;
    display:flex;background:rgba(255,255,255,0.72);border:2px solid var(--graphite);border-radius:999px;padding:3px;gap:2px;flex-shrink:0;
  }
  .ideas-category-btn{
    position:relative;z-index:1;
    border:none;background:transparent;padding:6px 14px;border-radius:999px;
    font-size:11px;font-weight:600;font-style:italic;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;
  }
  .ideas-category-btn:hover{color:var(--graphite);background:rgba(255,255,255,0.65)}
  .ideas-category-btn.active{background:var(--graphite);color:#fffaf0;box-shadow:var(--shadow-sm)}

  /* New-feature spotlight — pulsing white edge glow (no moving shine) */
  .ideas-category-switch--spotlight{
    border-color:var(--copper);
    animation:ideasEdgeGlowPulse 2.2s ease-in-out infinite;
  }
  .ideas-category-new{
    position:absolute;top:-11px;right:6px;z-index:4;
    font-size:8px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;font-style:normal;
    color:#fffaf0;background:linear-gradient(120deg,var(--copper),#c97f4e);
    padding:2px 8px;border-radius:999px;box-shadow:0 2px 10px rgba(165,100,58,.42);
    animation:ideasNewBadgePop 2.8s ease-in-out infinite;
  }
  @keyframes ideasEdgeGlowPulse{
    0%,100%{
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.9),
        0 0 10px 3px rgba(255,255,255,0.7),
        0 0 22px 8px rgba(255,255,255,0.38),
        0 0 0 4px rgba(165,100,58,0.18);
    }
    50%{
      box-shadow:
        0 0 0 3px rgba(255,255,255,1),
        0 0 16px 6px rgba(255,255,255,0.95),
        0 0 34px 14px rgba(255,255,255,0.62),
        0 0 52px 22px rgba(255,255,255,0.28),
        0 0 0 5px rgba(165,100,58,0.32);
    }
  }
  @keyframes ideasNewBadgePop{
    0%,100%{transform:scale(1) translateY(0)}
    50%{transform:scale(1.08) translateY(-1px)}
  }
  @media(prefers-reduced-motion:reduce){
    .ideas-category-switch--spotlight,
    .ideas-category-new{animation:none}
  }

  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}

  /* ── react-only badge ── */
  .react-badge{
    display:inline-flex;align-items:center;gap:6px;
    font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;
    color:#fffaf0;background:linear-gradient(120deg,var(--copper),#c97f4e);
    padding:3px 9px;border-radius:999px;box-shadow:0 2px 6px rgba(165,100,58,.3);
  }
  .react-badge::before{content:"⚛";font-size:11px}

  /* ── topbar ── */
  .topbar{
    position:sticky;top:0;z-index:90;overflow:visible;
    display:flex;align-items:center;gap:14px;padding:14px 28px;
    background:rgba(251,247,239,0.94);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .tb-brand{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--graphite);text-decoration:none;display:flex;align-items:center;gap:10px}
  .tb-brand:hover{color:var(--blue)}
  .tb-spacer{flex:1}
  .tb-search{
    flex:1;max-width:380px;display:flex;align-items:center;gap:8px;
    background:rgba(255,255,255,0.7);border:1px solid var(--line);border-radius:999px;
    padding:7px 14px;transition:all .15s;
  }
  .tb-search:focus-within{border-color:var(--copper);background:rgba(255,255,255,0.95);box-shadow:0 0 0 3px rgba(165,100,58,.08)}
  .tb-search-icon{font-size:13px;color:var(--soft)}
  .tb-search input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--graphite)}
  .tb-search input::placeholder{color:var(--soft);font-style:italic}
  .tb-search kbd{font-size:10px;background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:1px 6px;color:var(--soft);font-family:'Lora',serif}

  .view-switch{display:flex;background:rgba(255,255,255,0.6);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
  .view-switch-btn{
    border:none;background:transparent;padding:5px 14px;border-radius:999px;
    font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--muted);transition:all .2s;
    display:inline-flex;align-items:center;gap:6px;
  }
  .view-switch-btn:hover{color:var(--graphite)}
  .view-switch-btn.active{background:var(--graphite);color:#fffaf0;box-shadow:var(--shadow-sm)}
  .view-switch-btn .vs-icon{font-style:normal;font-size:13px;font-family:'Playfair Display',serif}

  .as-toggle{display:flex;background:rgba(255,255,255,0.6);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
  .as-toggle-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;cursor:pointer;font-size:11px;font-weight:600;border:1.5px solid transparent;transition:all .15s}
  .as-toggle-pill.active.AS{background:var(--teal-bg);color:var(--teal-fg);border-color:var(--teal-bd)}
  .as-toggle-pill.active.BS{background:var(--amber-bg);color:var(--amber-fg);border-color:var(--amber-bd)}
  .as-toggle-pill:not(.active){color:var(--soft);opacity:.55}
  .as-toggle-pill:not(.active):hover{opacity:.85}
  .as-ini-sm{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
  .as-ini-sm.AS{background:var(--teal-bg);color:var(--teal-fg);border:1px solid var(--teal-bd)}
  .as-ini-sm.BS{background:var(--amber-bg);color:var(--amber-fg);border:1px solid var(--amber-bd)}

  .tb-link{font-size:12px;font-style:italic;padding:7px 16px;border-radius:999px;background:var(--blue);color:#fffaf0;border:none;text-decoration:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .tb-link:hover{background:var(--blue-dk)}
  .tb-icon-btn{
    background:rgba(255,255,255,0.6);border:1px solid var(--line);border-radius:999px;
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    color:var(--muted);transition:all .15s;
  }
  .tb-icon-btn:hover{background:rgba(255,255,255,0.95);color:var(--graphite)}

  /* ── main layout ── */
  .layout{display:grid;grid-template-columns:240px 1fr;gap:0;min-height:calc(100vh - 60px)}
  .sidebar{
    padding:24px 22px;border-right:1px solid var(--line);
    background:rgba(255,253,248,0.4);
  }
  .main{padding:24px 32px 60px;min-width:0;position:relative}

  /* ── sidebar ── */
  .sb-section{margin-bottom:24px}
  .sb-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--copper);font-weight:700;margin-bottom:10px}
  .new-btn{
    width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
    font-size:13px;font-style:italic;padding:11px 16px;border-radius:999px;
    background:var(--copper);color:#fffaf0;border:none;
    box-shadow:0 6px 16px rgba(165,100,58,0.28);transition:all .2s;
  }
  .new-btn:hover{background:var(--copper-dk);transform:translateY(-1px);box-shadow:0 10px 22px rgba(165,100,58,0.36)}
  .new-btn .plus{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(255,250,240,0.22);font-style:normal;font-size:13px;line-height:1}

  .sb-stat{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;color:var(--muted);border-bottom:1px dashed rgba(222,212,193,0.5)}
  .sb-stat:last-child{border-bottom:none}
  .sb-stat-label{display:flex;align-items:center;gap:8px}
  .sb-stat-dot{width:8px;height:8px;border-radius:50%}
  .sb-stat-dot.s-halfbaked{background:var(--soft)}
  .sb-stat-dot.s-discuss{background:var(--blue)}
  .sb-stat-dot.s-plan{background:var(--copper)}
  .sb-stat-dot.s-approved{background:var(--green)}
  .sb-stat-dot.s-parked{background:#b0a285}
  .sb-stat-val{font-weight:700;font-variant-numeric:tabular-nums;color:var(--graphite)}
  .sb-stat.dim{opacity:.4}

  .sb-filter-list{display:flex;flex-direction:column;gap:4px}
  .sb-filter{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:transparent;border:none;padding:7px 10px;border-radius:8px;
    font-size:12px;color:var(--muted);text-align:left;width:100%;
    transition:all .12s;
  }
  .sb-filter:hover{background:rgba(255,255,255,0.6);color:var(--graphite)}
  .sb-filter.active{background:var(--graphite);color:#fffaf0}
  .sb-filter-count{font-size:10px;opacity:.6;font-variant-numeric:tabular-nums}

  .sb-tag-cloud{display:flex;flex-wrap:wrap;gap:5px}
  .sb-tag{
    font-size:10.5px;padding:3px 9px;border-radius:999px;
    background:rgba(255,255,255,0.6);border:1px solid var(--line);
    color:var(--muted);font-style:italic;cursor:pointer;transition:all .12s;
  }
  .sb-tag:hover{background:rgba(255,255,255,0.95);color:var(--graphite)}
  .sb-tag.active{background:var(--blue);color:#fffaf0;border-color:var(--blue)}

  .sb-clear{
    background:none;border:1px dashed var(--line);padding:6px 12px;border-radius:999px;
    font-size:10.5px;font-style:italic;color:var(--soft);width:100%;transition:all .12s;
  }
  .sb-clear:hover{color:var(--copper);border-color:var(--copper)}

  /* ── main header ── */
  .main-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .main-header-text h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--graphite);line-height:1.1;margin-bottom:4px}
  .main-header-text .sub{font-size:12px;font-style:italic;color:var(--muted)}
  .main-header--workspace .workspace-label{
    font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--copper);margin-bottom:4px;
  }
  .main-header--workspace .main-header-text h1{display:none}
  .main-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .compare-btn{
    font-size:11px;font-style:italic;padding:6px 14px;border-radius:999px;
    background:rgba(255,255,255,0.6);border:1px solid var(--line);color:var(--muted);transition:all .15s;
    display:inline-flex;align-items:center;gap:6px;
  }
  .compare-btn:hover{background:rgba(255,255,255,0.95);color:var(--graphite)}
  .compare-btn.active{background:var(--blue);color:#fffaf0;border-color:var(--blue)}
  .sort-select{
    font-size:11px;font-style:italic;padding:6px 12px;border-radius:999px;
    background:rgba(255,255,255,0.6);border:1px solid var(--line);color:var(--muted);outline:none;
  }

  /* ── active filter bar ── */
  .active-filters{display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .af-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);font-weight:600;margin-right:4px}
  .af-chip{
    display:inline-flex;align-items:center;gap:5px;
    font-size:10.5px;padding:3px 9px 3px 11px;border-radius:999px;
    background:rgba(35,36,33,0.85);color:#fffaf0;font-style:italic;
  }
  .af-chip-x{background:none;border:none;color:rgba(255,250,240,0.7);font-size:13px;line-height:1;padding:0 2px;cursor:pointer}
  .af-chip-x:hover{color:#fffaf0}

  /* ── highlight matches ── */
  mark.hi{background:rgba(184,147,68,0.35);color:inherit;padding:0 2px;border-radius:3px}

  /* ────────────────────────────────────────
     LIST VIEW
     ──────────────────────────────────────── */
  .list-view{display:flex;flex-direction:column;gap:12px}
  .ic{
    background:rgba(255,253,248,0.86);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 22px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
    transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s,border-color .2s,opacity .2s;
    animation:fade-in .35s cubic-bezier(.4,0,.2,1);
    cursor:pointer;
  }
  @keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .ic:hover{transform:translateY(-2px);box-shadow:0 18px 38px rgba(55,45,30,0.13);border-color:var(--soft)}
  .ic.selected{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,83,103,0.16)}
  .ic-bar{position:absolute;left:0;top:0;bottom:0;width:4px}
  .ic.s-halfbaked .ic-bar{background:var(--soft)}
  .ic.s-discuss .ic-bar{background:var(--blue)}
  .ic.s-plan .ic-bar{background:var(--copper)}
  .ic.s-approved .ic-bar{background:var(--green)}
  .ic.s-parked .ic-bar{background:#b0a285}

  .ic-checkbox{
    position:absolute;top:16px;right:16px;width:20px;height:20px;
    border:1.5px solid var(--soft);border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.7);
    transition:all .15s;display:flex;align-items:center;justify-content:center;color:#fffaf0;
  }
  .ic-checkbox:hover{border-color:var(--blue)}
  .ic-checkbox.checked{background:var(--blue);border-color:var(--blue)}
  .ic-checkbox.checked::after{content:"✓";font-size:12px;font-weight:700}

  .ic-meta{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:9px;font-size:11px;color:var(--muted)}
  .status-pill{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:.05em;padding:3px 10px;border-radius:999px;text-transform:uppercase}
  .status-pill::before{content:"";width:6px;height:6px;border-radius:50%}
  .status-pill.s-halfbaked{background:rgba(189,179,160,0.22);color:var(--muted)}
  .status-pill.s-halfbaked::before{background:var(--soft)}
  .status-pill.s-discuss{background:rgba(47,83,103,0.10);color:var(--blue-dk)}
  .status-pill.s-discuss::before{background:var(--blue)}
  .status-pill.s-plan{background:rgba(165,100,58,0.10);color:var(--copper-dk)}
  .status-pill.s-plan::before{background:var(--copper)}
  .status-pill.s-approved{background:rgba(73,111,97,0.12);color:var(--green)}
  .status-pill.s-approved::before{background:var(--green)}
  .status-pill.s-parked{background:rgba(176,162,133,0.18);color:#6e6650}
  .status-pill.s-parked::before{background:#b0a285}

  .author-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-style:italic;color:var(--muted)}
  .author-chip .ini{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-style:normal}
  .author-chip .ini.AS{background:var(--teal-bg);color:var(--teal-fg);border:1.5px solid var(--teal-bd)}
  .author-chip .ini.BS{background:var(--amber-bg);color:var(--amber-fg);border:1.5px solid var(--amber-bd)}
  .meta-sep{color:var(--soft)}
  .ic-date{font-style:italic;color:var(--soft)}

  .ic-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--graphite);margin-bottom:7px;line-height:1.25;padding-right:30px}
  .ic-summary{font-size:13px;line-height:1.65;color:var(--muted);margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ic-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .ic-tags{display:flex;gap:4px;flex-wrap:wrap}
  .ic-tag{font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,0.6);border:1px solid var(--line);color:var(--muted);font-style:italic;transition:all .12s}
  .ic-tag.match{background:var(--blue);color:#fffaf0;border-color:var(--blue)}
  .ic-stats{display:flex;align-items:center;gap:11px;font-size:11px;color:var(--soft);font-style:italic}

  /* ────────────────────────────────────────
     KANBAN VIEW
     ──────────────────────────────────────── */
  .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;min-height:520px}
  .kc{
    background:rgba(255,253,248,0.55);border:1px solid var(--line);border-radius:14px;
    padding:14px 10px;display:flex;flex-direction:column;gap:9px;min-width:0;
    transition:background .15s,border-color .15s;
  }
  .kc.drop-target{background:rgba(165,100,58,0.06);border-color:var(--copper);border-style:dashed}
  .kc-head{padding:0 4px 8px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:6px}
  .kc-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;display:inline-flex;align-items:center;gap:6px}
  .kc-title-dot{width:8px;height:8px;border-radius:50%}
  .kc-title.s-halfbaked{color:var(--muted)} .kc-title.s-halfbaked .kc-title-dot{background:var(--soft)}
  .kc-title.s-discuss{color:var(--blue-dk)} .kc-title.s-discuss .kc-title-dot{background:var(--blue)}
  .kc-title.s-plan{color:var(--copper-dk)} .kc-title.s-plan .kc-title-dot{background:var(--copper)}
  .kc-title.s-approved{color:var(--green)} .kc-title.s-approved .kc-title-dot{background:var(--green)}
  .kc-title.s-parked{color:#6e6650} .kc-title.s-parked .kc-title-dot{background:#b0a285}
  .kc-count{font-size:10px;color:var(--soft);font-variant-numeric:tabular-nums}
  .kc-body{display:flex;flex-direction:column;gap:8px;min-height:60px}
  .kc-empty{font-size:11px;font-style:italic;color:var(--soft);text-align:center;padding:18px 8px;background:rgba(255,255,255,0.3);border:1px dashed var(--line);border-radius:9px}

  .kc-card{
    background:rgba(255,253,248,0.95);border:1px solid var(--line);border-radius:10px;
    padding:11px 13px;box-shadow:0 2px 6px rgba(55,45,30,0.06);cursor:grab;
    transition:transform .15s,box-shadow .2s,opacity .2s;
    animation:fade-in .3s ease;
  }
  .kc-card:hover{box-shadow:0 8px 18px rgba(55,45,30,0.13);transform:translateY(-2px)}
  .kc-card:active{cursor:grabbing}
  .kc-card.dragging{opacity:.4}
  .kc-card-title{font-family:'Playfair Display',serif;font-size:12.5px;font-weight:700;line-height:1.25;color:var(--graphite);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .kc-card-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:6px}
  .kc-card-foot .author-chip{font-size:10px}
  .kc-card-foot .author-chip .ini{width:16px;height:16px;font-size:8px}
  .kc-card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
  .kc-card-tag{font-size:9px;padding:1px 6px;border-radius:999px;background:rgba(255,255,255,0.7);border:1px solid var(--line);color:var(--muted);font-style:italic}
  .kc-card-comments{font-size:10px;color:var(--soft);font-style:italic}

  /* ────────────────────────────────────────
     TIMELINE VIEW
     ──────────────────────────────────────── */
  .timeline{position:relative;padding-left:30px}
  .timeline::before{
    content:"";position:absolute;left:8px;top:8px;bottom:8px;width:2px;
    background:linear-gradient(180deg,var(--blue),var(--copper),var(--gold));opacity:.3;
  }
  .tl-group{margin-bottom:22px}
  .tl-group-label{
    font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
    color:var(--copper);margin-bottom:10px;padding:0 0 4px;
  }
  .tl-item{position:relative;margin-bottom:12px}
  .tl-dot{
    position:absolute;left:-30px;top:18px;width:18px;height:18px;border-radius:50%;
    background:var(--paper);border:2px solid var(--line);z-index:2;display:flex;align-items:center;justify-content:center;
  }
  .tl-dot::after{content:"";width:7px;height:7px;border-radius:50%}
  .tl-item.s-halfbaked .tl-dot::after{background:var(--soft)}
  .tl-item.s-discuss .tl-dot::after{background:var(--blue)}
  .tl-item.s-plan .tl-dot::after{background:var(--copper)}
  .tl-item.s-approved .tl-dot::after{background:var(--green)}
  .tl-item.s-parked .tl-dot::after{background:#b0a285}

  .tl-card{
    background:rgba(255,253,248,0.86);border:1px solid var(--line);border-radius:14px;
    padding:14px 18px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .2s;
    animation:fade-in .35s ease;
  }
  .tl-card:hover{transform:translateX(3px);box-shadow:0 12px 26px rgba(55,45,30,0.12);border-color:var(--soft)}
  .tl-time{font-size:10px;color:var(--soft);font-style:italic;margin-bottom:4px}
  .tl-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.3;color:var(--graphite);margin-bottom:6px}
  .tl-summary{font-size:12px;line-height:1.6;color:var(--muted);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .tl-meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px}

  /* ────────────────────────────────────────
     EMPTY STATE
     ──────────────────────────────────────── */
  .empty{
    text-align:center;padding:48px 24px;background:rgba(255,253,248,0.5);
    border:1px dashed var(--line);border-radius:var(--radius);
    animation:fade-in .4s ease;
  }
  .empty-icon{font-family:'Playfair Display',serif;font-size:42px;color:var(--soft);opacity:.5;margin-bottom:10px}
  .empty-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .empty-text{font-size:12px;font-style:italic;color:var(--soft);max-width:380px;margin:0 auto 14px;line-height:1.7}

  /* ────────────────────────────────────────
     DETAIL PANEL (slide-in from right)
     ──────────────────────────────────────── */
  .panel-overlay{
    position:fixed;inset:0;z-index:9250;background:rgba(40,30,15,0.28);
    opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(2px);
  }
  .panel-overlay.open{opacity:1;pointer-events:auto}
  .detail-panel{
    position:fixed;z-index:9260;
    background:linear-gradient(180deg,var(--paper) 0%,var(--ivory) 100%);
    border:1px solid var(--line);
    box-shadow:0 22px 60px rgba(55,45,30,0.28);
    display:flex;flex-direction:column;overflow:hidden;
    will-change:top,left,width,height,border-radius;
    transition:top .48s cubic-bezier(.32,.72,.28,1),
               left .48s cubic-bezier(.32,.72,.28,1),
               width .48s cubic-bezier(.32,.72,.28,1),
               height .48s cubic-bezier(.32,.72,.28,1),
               border-radius .48s ease,
               box-shadow .35s ease;
  }
  .detail-panel.open{box-shadow:0 30px 80px rgba(55,45,30,0.28), 0 8px 24px rgba(55,45,30,0.14)}
  .detail-panel > .panel-head,
  .detail-panel > .panel-body,
  .detail-panel > .panel-foot{
    transition:opacity .22s ease;
  }
  .detail-panel:not(.open) > .panel-head,
  .detail-panel:not(.open) > .panel-body,
  .detail-panel:not(.open) > .panel-foot{
    opacity:0;pointer-events:none;
  }
  .detail-panel.open > .panel-head{transition-delay:.16s}
  .detail-panel.open > .panel-body{transition-delay:.20s}
  .detail-panel.open > .panel-foot{transition-delay:.22s}
  .panel-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;border-bottom:1px solid var(--line);
    background:rgba(255,253,248,0.7);
  }
  .panel-head-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .panel-close{background:none;border:none;font-size:22px;color:var(--soft);padding:4px 10px;border-radius:8px;transition:all .15s}
  .panel-close:hover{color:var(--graphite);background:rgba(0,0,0,0.04)}

  /* Edit / Done toggle */
  .edit-toggle{
    display:inline-flex;align-items:center;gap:6px;
    font-family:inherit;font-size:11.5px;font-weight:600;letter-spacing:.02em;
    padding:6px 12px 6px 10px;border-radius:999px;
    background:transparent;color:var(--muted);
    border:1px solid var(--line);
    cursor:pointer;transition:all .15s;
  }
  .edit-toggle:hover{color:var(--graphite);background:rgba(255,253,248,0.85);border-color:var(--soft)}
  .edit-toggle.on{background:var(--copper);color:#fff7ee;border-color:var(--copper)}
  .edit-toggle.on:hover{background:#a05a3a;border-color:#a05a3a}
  .edit-toggle svg{display:block}

  /* Read-mode: fields shed their chrome and read as prose */
  .detail-panel:not(.editing) .d-field-card.required{background:transparent;border-color:transparent;margin-bottom:6px;border-radius:0;border-bottom:1px solid rgba(0,0,0,0.05);box-shadow:none}
  .detail-panel:not(.editing) .d-field-card.required .d-field-card-head{padding:6px 0 0}
  .detail-panel:not(.editing) .d-field-card.required .d-field-card-body-inner{padding:0 0 14px}
  .detail-panel:not(.editing) .d-field-card.required:hover{background:rgba(255,253,248,0.55);border-color:rgba(0,0,0,0.05);border-radius:8px;cursor:text}
  .detail-panel:not(.editing) .d-field-card.required{position:relative}
  .detail-panel:not(.editing) .d-field-card.required:hover .d-field-card-head::after{
    content:'double-click to edit';position:absolute;right:8px;
    font-size:9.5px;font-style:italic;color:var(--soft);letter-spacing:.04em;
    transform:translateY(-22px);pointer-events:none;
  }
  .detail-panel:not(.editing) .d-field-card.optional.collapsed .d-field-card-hint::after{content:' · click to open'}
  .detail-panel:not(.editing) .d-prompt{display:none}
  .detail-panel:not(.editing) .d-field-card.required .d-prompt{display:none}
  .detail-panel:not(.editing) .d-field-card.expanded.optional .d-prompt{display:block}
  .detail-panel:not(.editing) .d-text{cursor:text}
  .detail-panel:not(.editing) .d-text::placeholder{color:rgba(180,165,135,0.65);font-style:italic;font-size:12px}
  .d-text[readonly]{cursor:text;user-select:text}
  .d-title[readonly]{cursor:text}
  .d-title.editing:focus, .d-title[readonly]:focus{outline:none}
  .d-tag-empty{font-size:11px;font-style:italic;color:var(--soft)}
  .panel-body{flex:1;overflow-y:auto;padding:22px 26px}

  .d-status-select{
    font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
    padding:5px 13px 5px 22px;border-radius:999px;cursor:pointer;outline:none;
    border:none;appearance:none;-webkit-appearance:none;
    background-repeat:no-repeat;background-position:9px center;background-size:7px 7px;
    background-image:radial-gradient(circle,currentColor 30%,transparent 32%);
  }
  .d-status-select.s-halfbaked{background-color:rgba(189,179,160,0.22);color:var(--muted)}
  .d-status-select.s-discuss{background-color:rgba(47,83,103,0.10);color:var(--blue-dk)}
  .d-status-select.s-plan{background-color:rgba(165,100,58,0.10);color:var(--copper-dk)}
  .d-status-select.s-approved{background-color:rgba(73,111,97,0.12);color:var(--green)}
  .d-status-select.s-parked{background-color:rgba(176,162,133,0.18);color:#6e6650}

  .d-title{
    font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--graphite);
    line-height:1.2;border:none;background:transparent;outline:none;width:100%;resize:none;
    overflow:hidden;padding:0;margin-bottom:12px;min-height:30px;
  }
  .d-title:focus{border-bottom:1px dashed var(--soft)}
  .d-title::placeholder{color:var(--soft);font-style:italic}

  .d-tag-bar{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap;position:relative}
  .d-tag{font-size:11px;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,0.6);border:1px solid var(--line);color:var(--muted);font-style:italic;display:inline-flex;align-items:center;gap:4px}
  .d-tag-x{cursor:pointer;color:var(--soft);font-style:normal;font-size:13px;line-height:1;padding:0 2px}
  .d-tag-x:hover{color:var(--copper)}
  .d-tag-input-wrap{position:relative}
  .d-tag-input{font-size:11px;font-style:italic;color:var(--graphite);background:transparent;border:1px dashed var(--line);padding:3px 10px;border-radius:999px;outline:none;width:120px;font-family:inherit;transition:border-color .15s}
  .d-tag-input:focus{border-color:var(--copper);border-style:solid}
  .d-tag-input::placeholder{color:var(--soft)}
  .d-tag-suggest{
    position:absolute;top:100%;left:0;margin-top:4px;
    background:var(--paper);border:1px solid var(--line);border-radius:10px;
    box-shadow:var(--shadow);padding:5px;z-index:10;min-width:140px;
    display:flex;flex-direction:column;gap:2px;
  }
  .d-tag-suggest-item{
    font-size:11px;font-style:italic;color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;
    background:none;border:none;text-align:left;
  }
  .d-tag-suggest-item:hover,.d-tag-suggest-item.active{background:rgba(47,83,103,0.10);color:var(--blue-dk)}

  .d-field{background:rgba(255,253,248,0.78);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
  .d-field:focus-within{border-color:var(--copper)}

  .d-field-card{
    background:rgba(255,253,248,0.78);border:1px solid var(--line);border-radius:12px;
    margin-bottom:10px;overflow:hidden;transition:border-color .15s,box-shadow .15s,background .15s;
  }
  .d-field-card:focus-within{border-color:var(--copper)}
  .d-field-card.optional.collapsed{
    background:rgba(255,253,248,0.52);border-style:dashed;cursor:pointer;
  }
  .d-field-card.optional.collapsed:hover{
    border-color:var(--copper);background:rgba(255,253,248,0.88);box-shadow:var(--shadow-sm);
  }
  .d-field-card.optional.collapsed.has-content{border-style:solid;border-color:rgba(165,100,58,0.28)}
  .d-field-card-head{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    padding:12px 16px 10px;
  }
  .d-field-card.optional .d-field-card-head{cursor:pointer;user-select:none}
  .d-field-card.optional.collapsed .d-field-card-head{padding:10px 14px}
  .d-field-card-chevron{
    width:14px;flex-shrink:0;font-size:11px;line-height:1;color:var(--copper);font-weight:700;
  }
  .d-field-card-label{
    font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);font-weight:700;
  }
  .d-field-card-preview{
    flex:1;min-width:0;margin-left:4px;font-size:12px;font-style:italic;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .d-field-card-hint{
    margin-left:auto;font-size:10px;font-style:italic;color:var(--soft);
  }
  .d-field-card-body{
    display:grid;grid-template-rows:1fr;
    transition:grid-template-rows .28s cubic-bezier(.4,0,.2,1);
  }
  .d-field-card.optional.collapsed .d-field-card-body{grid-template-rows:0fr}
  .d-field-card-body-inner{overflow:hidden;padding:0 16px 14px}
  .d-field-card.optional.collapsed .d-field-card-body-inner{padding-bottom:0}
  .d-field-card-body-inner .d-prompt{margin-bottom:6px}
  .d-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:8px}
  .d-label .opt{font-style:italic;color:var(--soft);font-weight:400;letter-spacing:0;text-transform:none;font-size:10.5px}
  .d-label .quality{margin-left:auto;font-size:10px;font-style:italic;color:var(--soft);font-weight:400;letter-spacing:.04em}
  .d-label .quality.good{color:var(--green)}
  .d-field-card-head .opt{font-style:italic;color:var(--soft);font-weight:400;letter-spacing:0;text-transform:none;font-size:10.5px}
  .d-field-card-head .quality{margin-left:auto;font-size:10px;font-style:italic;color:var(--soft);font-weight:400;letter-spacing:.04em}
  .d-field-card-head .quality.good{color:var(--green)}
  .d-prompt{font-size:11px;font-style:italic;color:var(--soft);margin-bottom:6px;line-height:1.55}
  .d-text{width:100%;border:none;background:transparent;outline:none;font-family:'Lora',serif;font-size:13px;line-height:1.65;color:var(--graphite);resize:none;min-height:22px}
  .d-text::placeholder{color:var(--soft);font-style:italic}

  .d-hidden-bar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin:4px 0 12px;padding:8px 12px;border-radius:999px;
    background:rgba(255,255,255,0.55);border:1px solid var(--line);
  }
  .d-hidden-bar-text{font-size:10px;font-style:italic;color:var(--soft)}
  .d-hidden-bar-show{
    border:none;background:transparent;color:var(--copper);font-size:10px;
    font-weight:600;font-style:italic;cursor:pointer;padding:2px 8px;border-radius:999px;
  }
  .d-hidden-bar-show:hover{background:rgba(165,100,58,0.10)}

  .d-comments{background:rgba(255,253,248,0.85);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-top:14px}
  .d-comments-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--copper);font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .d-thread{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
  .d-comment{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:flex-start;animation:fade-in .3s ease}
  .d-comment-ini{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
  .d-comment-ini.AS{background:var(--teal-bg);color:var(--teal-fg);border:2px solid var(--teal-bd)}
  .d-comment-ini.BS{background:var(--amber-bg);color:var(--amber-fg);border:2px solid var(--amber-bd)}
  .d-comment-bubble{background:rgba(255,255,255,0.65);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .d-comment.AS .d-comment-bubble{border-left:3px solid var(--teal-bd)}
  .d-comment.BS .d-comment-bubble{border-left:3px solid var(--amber-bd)}
  .d-comment-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:10px;color:var(--soft);font-style:italic}
  .d-comment-author{font-weight:600;font-style:normal;color:var(--muted)}
  .d-comment.AS .d-comment-author{color:var(--teal-fg)}
  .d-comment.BS .d-comment-author{color:var(--amber-fg)}
  .d-comment-time{margin-left:auto}
  .d-comment-del{background:none;border:none;color:var(--soft);font-size:13px;padding:0 4px;border-radius:5px;line-height:1}
  .d-comment-del:hover{color:#a83a23}
  .d-comment-text{font-size:13px;line-height:1.65;color:var(--graphite);white-space:pre-wrap;word-break:break-word}
  .d-comment-empty{padding:14px;text-align:center;font-style:italic;color:var(--soft);font-size:12px;background:rgba(255,255,255,0.4);border:1px dashed var(--line);border-radius:10px}

  .d-comment-form{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:flex-start;padding-top:14px;border-top:1px solid var(--line)}
  .d-comment-input{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,0.7);font-size:12.5px;color:var(--graphite);outline:none;resize:vertical;min-height:56px;transition:border-color .15s}
  .d-comment-input:focus{border-color:var(--copper)}
  .d-comment-input::placeholder{color:var(--soft);font-style:italic}
  .d-comment-form-row{display:flex;justify-content:flex-end;margin-top:6px}
  .d-comment-send{font-size:11px;font-style:italic;padding:6px 16px;border-radius:999px;background:var(--blue);color:#fffaf0;border:none;transition:all .15s}
  .d-comment-send:hover:not(:disabled){background:var(--blue-dk)}
  .d-comment-send:disabled{opacity:.4;cursor:not-allowed}

  .panel-foot{
    display:flex;justify-content:space-between;align-items:center;gap:12px;flex-shrink:0;
    padding:14px 24px;border-top:1px solid var(--line);
    background:rgba(255,253,248,0.92);font-size:10px;color:var(--soft);font-style:italic;
  }
  .del-btn{font-size:11px;font-style:italic;padding:6px 14px;border-radius:999px;background:#a83a23;color:#fff7f0;border:1px solid #a83a23;transition:all .15s}
  .del-btn:hover{background:#8a2e1a;border-color:#8a2e1a}

  /* ────────────────────────────────────────
     COMPARE PANEL
     ──────────────────────────────────────── */
  .compare-bar{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--graphite);color:#fffaf0;border-radius:999px;padding:10px 18px;
    box-shadow:0 10px 30px rgba(40,30,15,0.35);
    display:flex;align-items:center;gap:12px;z-index:80;
    animation:fade-up .25s cubic-bezier(.4,0,.2,1);
  }
  @keyframes fade-up{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
  .compare-bar-text{font-size:12px;font-style:italic}
  .compare-bar-btn{font-size:11px;font-style:italic;padding:5px 14px;border-radius:999px;background:var(--copper);color:#fffaf0;border:none}
  .compare-bar-btn:hover{background:var(--copper-dk)}
  .compare-bar-btn:disabled{opacity:.4}
  .compare-bar-clear{background:none;border:none;color:rgba(255,250,240,0.65);font-size:11px;font-style:italic;text-decoration:underline}
  .compare-bar-clear:hover{color:#fffaf0}

  .compare-overlay{
    position:fixed;inset:0;z-index:9270;background:rgba(40,30,15,0.4);display:flex;align-items:center;justify-content:center;
    padding:24px;backdrop-filter:blur(4px);animation:fade-in .25s ease;
  }
  .compare-modal{
    background:linear-gradient(180deg,var(--paper) 0%,var(--ivory) 100%);
    border:1px solid var(--line);border-radius:18px;
    box-shadow:0 30px 80px rgba(40,30,15,0.4);max-width:1100px;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;
  }
  .compare-head{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:rgba(255,253,248,0.6)}
  .compare-head h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
  .compare-body{flex:1;overflow-y:auto;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .compare-col{background:rgba(255,253,248,0.78);border:1px solid var(--line);border-radius:14px;padding:18px 20px;overflow:hidden}
  .compare-col-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.25;margin-bottom:10px}
  .compare-col-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .compare-row{margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed rgba(222,212,193,0.5)}
  .compare-row:last-child{border-bottom:none}
  .compare-row-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);font-weight:700;margin-bottom:5px}
  .compare-row-text{font-size:12.5px;line-height:1.6;color:var(--graphite)}
  .compare-row-text.empty{color:var(--soft);font-style:italic}

  /* ────────────────────────────────────────
     KEYBOARD SHORTCUTS OVERLAY
     ──────────────────────────────────────── */
  .kbd-overlay{
    position:fixed;inset:0;z-index:400;background:rgba(40,30,15,0.45);display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(4px);animation:fade-in .2s ease;
  }
  .kbd-modal{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 30px 80px rgba(40,30,15,0.4);padding:26px 32px;max-width:480px;width:90%}
  .kbd-modal h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:18px}
  .kbd-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed rgba(222,212,193,0.5);font-size:13px;color:var(--muted)}
  .kbd-row:last-child{border-bottom:none}
  .kbd-keys{display:flex;gap:4px}
  .kbd-key{background:var(--paper2);border:1px solid var(--line);border-radius:6px;padding:3px 9px;font-size:11px;font-family:'Lora',serif;color:var(--graphite);font-weight:600;min-width:24px;text-align:center}

  .react-feature-tip{
    position:fixed;bottom:24px;right:24px;z-index:70;max-width:320px;
    background:var(--graphite);color:#fffaf0;border-radius:14px;padding:14px 18px;
    box-shadow:0 18px 40px rgba(40,30,15,0.32);font-size:12px;line-height:1.5;
    animation:fade-up .3s ease;
  }
  .react-feature-tip .tip-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--copper);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:6px}
  .react-feature-tip .tip-close{position:absolute;top:8px;right:10px;background:none;border:none;color:rgba(255,250,240,0.5);font-size:14px;cursor:pointer}
  .react-feature-tip .tip-close:hover{color:#fffaf0}

  @media(max-width:920px){
    .layout{grid-template-columns:1fr}
    .sidebar{border-right:none;border-bottom:1px solid var(--line)}
    .kanban{grid-template-columns:repeat(2,1fr)}
    .compare-body{grid-template-columns:1fr}
  }
  @media(max-width:680px){
    .topbar{flex-wrap:wrap;padding:12px 16px}
    .tb-search{width:100%;order:10;max-width:none}
  }
</style>
