<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Atlas — Research Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --vellum:#F3EAD8; --vellum-deep:#E7DAC1; --vellum-edge:#DCCCAC;
    --clay:#B0654A; --slate:#3C4A57; --slate-soft:#5C6B79;
    --gold:#9C7A2C; --gold-soft:#C29A4A; --sage:#5E7A6B;
    --ink:#2A2620; --ink-soft:#6B6356; --body:#3b372f;
    --pearl:#FBF8F1; --pearl-2:#F5EFE2; --line:rgba(60,74,87,.08);
    --dw-bg1:#33404B; --dw-bg2:#2B3742; --dw-text:#E9E2D3; --dw-muted:#A9B4BD; --dw-faint:#8C97A0; --dw-hover:rgba(255,255,255,.07); --dw-field:rgba(0,0,0,.18); --dw-field-border:rgba(255,255,255,.12); --dw-border:rgba(255,255,255,.08); --dw-shadow:rgba(0,0,0,.25);
    --serif:"Newsreader",Georgia,serif; --sans:"Hanken Grotesk",system-ui,sans-serif;
    --shadow-rest:0 1px 2px rgba(42,38,32,.10), 0 8px 22px rgba(42,38,32,.10);
    --shadow-lift:0 6px 14px rgba(42,38,32,.16), 0 28px 60px rgba(42,38,32,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{font-family:var(--sans); color:var(--ink); overflow:hidden; display:flex; background:var(--vellum-deep)}
  body.is-dragging{user-select:none;cursor:grabbing}

  /* DRAWER */
  .drawer{width:288px; flex:0 0 288px; height:100vh; display:flex; flex-direction:column;
    background:linear-gradient(180deg,var(--dw-bg1),var(--dw-bg2)); color:var(--dw-text);
    border-right:1px solid var(--dw-border); box-shadow:6px 0 24px var(--dw-shadow); z-index:50; position:relative; transition:background .25s, color .25s}
  .brand{padding:20px 22px 14px}
  .brand-tile{position:relative; width:158px; aspect-ratio:767/466; border-radius:16px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(115deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.4) 18%, rgba(255,255,255,0) 40%, rgba(255,255,255,.2) 62%, rgba(255,255,255,0) 82%),
      linear-gradient(180deg, #F8F7F2 0%, #FDFCFA 12%, #F2F1EC 32%, #D8D4CB 55%, #E7E2DB 100%);
    box-shadow:0 1px 2px rgba(20,20,20,.18), 0 10px 22px -12px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.6)}
  .brand-tile::before{content:""; position:absolute; inset:6px; border-radius:11px; border:1px solid rgba(255,255,255,.5); pointer-events:none}
  .brandmark{display:block; width:88%; height:auto}
  .brand-tile{cursor:pointer}
  .brand-tile.navy{border-color:rgba(255,255,255,.10);
    background:linear-gradient(115deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.12) 18%, rgba(255,255,255,0) 40%, rgba(255,255,255,.06) 62%, rgba(255,255,255,0) 82%),
      linear-gradient(180deg,#2A3C5D 0%,#213350 12%,#142239 55%,#1A2B48 100%);
    box-shadow:0 1px 2px rgba(0,0,0,.25), 0 12px 26px -12px rgba(10,15,30,.6), inset 0 1px 0 rgba(255,255,255,.16)}
  .brand-tile.navy::before{border-color:rgba(255,255,255,.14)}
  .brand-tile.matte{border:1px solid rgba(40,46,54,.16); background:#ECE7DB; box-shadow:0 8px 20px -12px rgba(60,50,30,.4)}
  .brand-tile.matte::before{border-color:rgba(40,46,54,.10)}
  .fh-name{font-weight:600}
  .fh-color{margin-left:6px; width:16px; height:16px; flex:0 0 auto}
  .folder-head .count{margin-left:auto}
  .brand .kicker{font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold-soft); font-weight:600}
  .brand h1{font-family:var(--serif); font-weight:500; font-size:25px; margin:4px 0 2px}
  .brand p{margin:0; font-size:12.5px; color:var(--dw-muted)}
  .search{padding:0 18px 12px; position:relative}
  .search input{width:100%; padding:9px 12px; border-radius:999px; border:1px solid var(--dw-field-border);
    background:var(--dw-field); color:var(--dw-text); font-family:var(--sans); font-size:13px; outline:none}
  .search input::placeholder{color:var(--dw-faint)}
  .search input:focus{border-color:var(--gold-soft)}
  .search-suggest{position:absolute; left:14px; right:14px; top:42px; z-index:50; background:var(--dw-bg1); border:1px solid var(--dw-border); border-radius:12px; box-shadow:var(--shadow-lift); padding:5px; max-height:300px; overflow-y:auto; display:none}
  .search-suggest.on{display:block}
  .ss-label{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--dw-faint); font-weight:700; padding:8px 10px 4px}
  .ss-row{display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:8px; cursor:pointer; color:var(--dw-text); font-size:13px}
  .ss-row:hover{background:var(--dw-hover)}
  .ss-row .dot{width:9px; height:9px; border-radius:50%; flex:0 0 auto}
  .ss-row .ss-sub{font-size:11px; color:var(--dw-faint); margin-left:auto}
  .lib-empty{padding:16px 14px; font-size:12.5px; line-height:1.5; color:var(--dw-faint)}
  .note-ctrls{margin-left:auto; display:flex; align-items:center; gap:4px; opacity:0; transition:opacity .15s}
  .item:hover .note-ctrls{opacity:1}
  .nc-glow{border:none; background:transparent; cursor:pointer; color:var(--dw-faint); font-size:13px; width:22px; height:22px; border-radius:6px; line-height:1}
  .nc-glow:hover{background:var(--dw-hover)}
  .nc-glow.on{color:var(--gold)}
  .nc-color{position:relative; width:18px; height:18px; border-radius:50%; cursor:pointer; box-shadow:inset 0 0 0 1px rgba(0,0,0,.15); overflow:hidden}
  .nc-color input{position:absolute; inset:-4px; width:26px; height:26px; border:none; padding:0; cursor:pointer; opacity:0}
  .item .bar.glow{box-shadow:0 0 4px 0 var(--bar), 0 0 9px 1px var(--bar); filter:saturate(1.3) brightness(1.12)}
  .folders{flex:1; overflow-y:auto; padding:4px 12px 24px}
  .folders::-webkit-scrollbar{width:8px}
  .folders::-webkit-scrollbar-thumb{background:var(--dw-border); border-radius:8px}
  .folder{margin-bottom:6px}
  .folder-head{display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:9px; cursor:pointer; font-weight:600; font-size:13px; user-select:none}
  .folder-head:hover{background:var(--dw-hover)}
  .folder-head .dot{width:9px; height:9px; border-radius:50%; flex:0 0 auto}
  .folder-head .count{margin-left:auto; font-size:11px; color:var(--dw-faint); font-weight:500}
  .folder-head .chev{transition:transform .2s ease; color:var(--dw-faint); font-size:11px}
  .folder.collapsed .chev{transform:rotate(-90deg)}
  .folder.collapsed .items{display:none}
  .items{padding:2px 0 6px 6px}
  .item{position:relative; display:flex; align-items:flex-start; gap:9px; padding:8px 10px 8px 14px; border-radius:8px; cursor:grab; margin:1px 0; transition:background .14s}
  .item:hover{background:var(--dw-hover)}
  .item:active{cursor:grabbing}
  .item .bar{position:absolute; left:5px; top:9px; bottom:9px; width:3px; border-radius:3px}
  .item .it-title{font-size:13px; line-height:1.3; color:var(--dw-text)}
  .item .it-sub{font-size:11px; color:var(--dw-faint); margin-top:1px}
  .drawer-foot{padding:11px 20px 14px; font-size:11px; color:var(--dw-faint); border-top:1px solid var(--dw-border)}

  /* STAGE */
  .stage{flex:1; position:relative; overflow:hidden; cursor:grab}
  .stage.panning{cursor:grabbing}
  .stage.drawmode{cursor:crosshair}
  .stage.linkmode{cursor:alias}
  .stage.drawmode .win, .stage.drawmode .shape{pointer-events:none}
  .stage.drawmode .conn-hit{pointer-events:none}
  .stage.linkmode .note-body{pointer-events:none}
  .surface{position:absolute; top:0; left:0; transform-origin:0 0; background-color:var(--vellum);
    background-image:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,.45), rgba(255,255,255,0) 60%),
      repeating-linear-gradient(0deg, var(--line) 0 1px, transparent 1px 46px),
      repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 46px),
      linear-gradient(135deg, rgba(176,101,74,.04), rgba(60,74,87,.04))}
  .ink{position:absolute; left:0; top:0; pointer-events:none; z-index:1; overflow:visible}
  .conns{position:absolute; left:0; top:0; pointer-events:none; z-index:2; overflow:visible}
  .conn-hit{pointer-events:stroke; stroke:transparent; stroke-width:16; fill:none; cursor:pointer}
  .conn-line{pointer-events:none; fill:none; stroke-linecap:round}
  .guides{position:absolute; left:0; top:0; pointer-events:none; z-index:99999; overflow:visible}
  .vignette{position:absolute; inset:0; pointer-events:none; z-index:6;
    background:
      radial-gradient(120% 90% at 50% 28%, rgba(255,250,240,.18), rgba(255,250,240,0) 45%),
      radial-gradient(150% 130% at 50% 55%, rgba(42,38,32,0) 58%, rgba(42,38,32,.16) 100%)}

  /* WINDOWS / NOTES / EMBEDS */
  .win{position:absolute; min-width:200px; min-height:110px; width:340px; height:260px;
    background:linear-gradient(180deg,var(--pearl),var(--pearl-2)); border:1px solid rgba(255,255,255,.8);
    border-radius:14px; overflow:visible; box-shadow:var(--shadow-rest); display:flex; flex-direction:column;
    animation:pop .26s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes pop{from{opacity:0; transform:scale(.94)} to{opacity:1; transform:scale(1)}}
  .win.focused{box-shadow:var(--shadow-lift)}
  .win.linktarget{outline:2px solid var(--gold-soft); outline-offset:2px}
  .win.min{height:auto !important; min-height:0}
  .win.min .win-body, .win.min .win-resize{display:none}
  .win-bar{display:flex; align-items:center; gap:8px; padding:9px 11px; cursor:grab; flex:0 0 auto;
    background:linear-gradient(180deg, rgba(255,255,255,.7), rgba(245,239,226,.4)); border-bottom:1px solid rgba(60,74,87,.10); border-radius:14px 14px 0 0}
  .win-bar:active{cursor:grabbing}
  .win-dot{width:9px; height:9px; border-radius:50%; flex:0 0 auto; box-shadow:0 0 0 3px rgba(255,255,255,.5)}
  .win-title{font-family:var(--serif); font-size:15px; font-weight:500; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:58%}
  .win-cat{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); white-space:nowrap}
  .win-src{margin-left:auto; font-size:11px; font-weight:600; color:var(--clay); text-decoration:none; white-space:nowrap}
  .win-src:hover{text-decoration:underline}
  .win-ctrls{margin-left:auto; display:flex; gap:4px}
  .win-ctrls button{width:22px; height:22px; border:none; border-radius:7px; cursor:pointer; font-size:14px; line-height:1; background:rgba(60,74,87,.07); color:var(--ink-soft); font-family:var(--sans); display:grid; place-items:center; transition:.12s}
  .win-ctrls button:hover{background:rgba(60,74,87,.16); color:var(--ink)}
  .win-ctrls .win-close:hover{background:var(--clay); color:#fff}
  .win-body{flex:1; overflow:auto; padding:14px 16px 16px; font-size:13.5px; line-height:1.55; color:var(--body); border-radius:0 0 14px 14px}
  .win-body::-webkit-scrollbar{width:8px}
  .win-body::-webkit-scrollbar-thumb{background:rgba(60,74,87,.18); border-radius:8px}
  .win-body h3{font-family:var(--serif); font-weight:600; font-size:16px; margin:0 0 6px}
  .win-body h1{font-family:var(--serif); font-weight:600; font-size:18px; margin:2px 0 7px}
  .win-body h2{font-family:var(--serif); font-weight:600; font-size:15.5px; margin:13px 0 5px; color:var(--slate)}
  .win-body h4{font-family:var(--serif); font-weight:600; font-size:13.5px; margin:14px 0 4px; color:var(--slate)}
  .win-body strong,.win-body b{font-weight:700}
  .win-body em,.win-body i{font-style:italic}
  .win-body ol{margin:0 0 9px; padding-left:20px}
  .win-body a{color:var(--clay)}
  .win-body p{margin:0 0 9px}
  .win-body ul{margin:0 0 9px; padding-left:18px}
  .win-body table{width:100%; border-collapse:collapse; margin:6px 0 10px; font-size:12.5px}
  .win-body th,.win-body td{text-align:left; padding:6px 8px; border-bottom:1px solid rgba(60,74,87,.12)}
  .win-body th{font-weight:600; color:var(--slate); background:rgba(60,74,87,.05)}
  .win-body img{max-width:100%; border-radius:6px; margin:4px 0}
  .tbc{color:var(--clay); font-weight:600}
  .chip{display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:600; margin:2px 4px 2px 0}
  .chip.r{background:rgba(176,101,74,.16); color:#9a4b30}
  .chip.a{background:rgba(156,122,44,.18); color:#7a5f1d}
  .chip.g{background:rgba(94,122,107,.18); color:#3f5a4c}
  .win-body .eq{font-family:var(--serif); font-style:italic; background:rgba(60,74,87,.05); padding:8px 12px; border-left:3px solid var(--gold-soft); border-radius:4px; margin:6px 0 10px}
  .win-resize{position:absolute; right:-6px; bottom:-6px; width:32px; height:32px; cursor:nwse-resize; z-index:6; border-radius:0 0 14px 0}
  .win-resize::after{content:""; position:absolute; right:10px; bottom:10px; width:10px; height:10px; border-right:2px solid rgba(60,74,87,.35); border-bottom:2px solid rgba(60,74,87,.35)}
  .win:hover .win-resize{background:rgba(60,74,87,.05)}
  .rz{position:absolute; z-index:6}
  .win.min .rz{display:none}
  .rz-n{top:-10px; left:18px; right:18px; height:18px; cursor:ns-resize}
  .rz-s{bottom:-10px; left:18px; right:18px; height:18px; cursor:ns-resize}
  .rz-e{right:-10px; top:18px; bottom:18px; width:18px; cursor:ew-resize}
  .rz-w{left:-10px; top:18px; bottom:18px; width:18px; cursor:ew-resize}
  .rz-ne{top:-12px; right:-12px; width:26px; height:26px; cursor:nesw-resize}
  .rz-nw{top:-12px; left:-12px; width:26px; height:26px; cursor:nwse-resize}
  .rz-sw{bottom:-12px; left:-12px; width:26px; height:26px; cursor:nesw-resize}
  .win:hover .rz{background:rgba(60,74,87,.05)}
  .win-ctrls{position:relative; z-index:8}
  .note .win-dot{background:var(--gold)}
  .note .win-bar{
    background:
      linear-gradient(115deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.38) 18%, rgba(255,255,255,0) 38%, rgba(255,255,255,.20) 60%, rgba(255,255,255,0) 80%),
      linear-gradient(180deg, #F8F7F2 0%, #FDFCFA 12%, #F2F1EC 30%, #D8D4CB 52%, #E5E0D7 72%, #E7E2DB 100%);
    border-bottom:1px solid rgba(60,74,87,.10);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.85), inset 0 -2px 4px rgba(120,110,95,.12);
  }
  .note .win-body{background:linear-gradient(180deg,#FFFDF7,#FBF6EA); cursor:text; outline:none}
  .note-body:focus,.note-title:focus{outline:none}
  .note-title{cursor:text}
  .note-title:focus{background:rgba(255,255,255,.65); border-radius:5px; padding:0 5px; max-width:72%}
  .note-body[placeholder]:empty::before{content:attr(placeholder); color:#b3a98f}
  .embed .win-dot{background:#2F6F8F}
  .embed .win-body{padding:0; background:#fff; overflow:hidden}
  .embed iframe{width:100%; height:100%; border:0; display:block}
  .embed-ph{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; padding:18px; text-align:center; color:var(--ink-soft); font-size:13px}
  .embed-ph button{border:1px solid rgba(60,74,87,.2); background:var(--pearl); color:var(--slate); border-radius:9px; padding:8px 14px; cursor:pointer; font-family:var(--sans); font-weight:600}

  /* SHAPES + IMAGES */
  .shape{position:absolute; min-width:36px; min-height:36px; cursor:grab}
  .shape:active{cursor:grabbing}
  .shape svg{width:100%; height:100%; display:block; overflow:visible}
  .shape.selected{outline:1.5px dashed var(--slate-soft); outline-offset:4px}
  .shape.linktarget{outline:2px solid var(--gold-soft); outline-offset:3px}
  .shape .win-resize{display:none}
  .shape.selected .win-resize{display:block}
  .shape .shape-del{display:none; position:absolute; top:-11px; right:-11px; width:22px; height:22px; border-radius:50%; background:var(--clay); color:#fff; align-items:center; justify-content:center; font-size:14px; cursor:pointer; box-shadow:var(--shadow-rest)}
  .shape.selected .shape-del{display:flex}
  .imgobj{background:#fff; border-radius:9px; box-shadow:var(--shadow-rest); overflow:hidden}
  .imgobj img{width:100%; height:100%; object-fit:contain; display:block; pointer-events:none}
  .lockbadge{position:absolute; top:-9px; left:-9px; width:22px; height:22px; border-radius:50%; background:var(--slate); color:#fff; display:none; align-items:center; justify-content:center; opacity:.42; cursor:pointer; z-index:5; box-shadow:var(--shadow-rest); transition:opacity .15s}
  .bonded .lockbadge{display:flex}
  .lockbadge:hover{opacity:1}
  .shape-lock{display:none; position:absolute; bottom:-11px; left:-11px; width:22px; height:22px; border-radius:50%; background:var(--slate); color:#fff; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--shadow-rest)}
  .shape.selected:not(.bonded) .shape-lock{display:flex}
  .bonded{outline:1px solid rgba(60,74,87,.18); outline-offset:2px}

  /* HUD */
  .hud{position:absolute; top:16px; right:18px; z-index:30; display:flex; gap:8px; align-items:center}
  .hud .pill{display:flex; align-items:center; gap:2px; background:rgba(251,248,241,.92); backdrop-filter:blur(6px); border:1px solid rgba(60,74,87,.14); border-radius:999px; padding:4px; box-shadow:var(--shadow-rest); position:relative}
  .hud button{border:none; background:transparent; cursor:pointer; font-family:var(--sans); font-size:13px; font-weight:600; color:var(--slate); padding:6px 12px; border-radius:999px; transition:.12s}
  .hud button:hover{background:rgba(60,74,87,.10)}
  .hud .zoom button{width:30px; padding:6px 0; font-size:15px; text-align:center}
  .hud .zlevel{font-size:11.5px; color:var(--ink-soft); min-width:38px; text-align:center; font-weight:600}
  .hud .danger:hover{background:var(--clay); color:#fff}
  .menu{position:absolute; top:46px; right:0; background:var(--pearl); border:1px solid rgba(60,74,87,.16); border-radius:12px; box-shadow:var(--shadow-lift); padding:6px; display:none; flex-direction:column; min-width:150px; z-index:60}
  .menu.on{display:flex}
  .menu button{text-align:left; padding:9px 12px; border-radius:8px; font-size:13px}

  /* BOARD BAR */
  .boards{position:absolute; top:16px; left:18px; z-index:35; display:flex; gap:5px; align-items:center; background:rgba(251,248,241,.92); backdrop-filter:blur(6px); border:1px solid rgba(60,74,87,.14); border-radius:12px; padding:4px; box-shadow:var(--shadow-rest); max-width:48vw; flex-wrap:wrap}
  .board-tab{border:none; background:transparent; cursor:pointer; font-family:var(--sans); font-size:13px; font-weight:600; color:var(--slate); padding:6px 11px; border-radius:8px; display:flex; align-items:center; gap:6px}
  .board-tab:hover{background:rgba(60,74,87,.08)}
  .board-tab.active{background:var(--slate); color:#fff}
  .board-tab .bx{opacity:.5; font-size:14px; line-height:1}
  .board-tab.active .bx:hover{opacity:1}
  .board-add{border:none; background:transparent; cursor:pointer; color:var(--slate); font-size:17px; width:30px; height:30px; border-radius:8px}
  .board-add:hover{background:rgba(60,74,87,.10)}

  /* DOCK */
  .dock{position:absolute; left:50%; bottom:18px; transform:translateX(-50%); z-index:40; display:flex; align-items:center; gap:5px; padding:6px; background:rgba(251,248,241,.95); backdrop-filter:blur(8px); border:1px solid rgba(60,74,87,.16); border-radius:16px; box-shadow:var(--shadow-rest); flex-wrap:wrap; max-width:94vw; justify-content:center}
  .dock button{border:none; background:transparent; cursor:pointer; font-family:var(--sans); color:var(--slate); border-radius:10px; height:34px; min-width:34px; padding:0 9px; font-size:15px; display:inline-flex; align-items:center; justify-content:center; gap:5px; transition:.12s}
  .dock button:hover{background:rgba(60,74,87,.10)}
  .dock button.active{background:var(--slate); color:#fff}
  .dock .sep{width:1px; height:24px; background:rgba(60,74,87,.16); margin:0 3px}
  .dock .widths{display:flex; gap:2px}
  .dock .widths button i{display:block; background:var(--slate); border-radius:50%}
  .dock .widths button.active{background:rgba(60,74,87,.16)}
  .dock .swatches{display:flex; gap:5px; padding:0 3px}
  .swatch{width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent; box-shadow:inset 0 0 0 1px rgba(0,0,0,.10)}

    {id:"nfs-p1", title:"Paper 1 — Bimodal Joint Separation", sub:"Circular statistics · 5 sites", body:`<h3>Statistically separating two joint families</h3><p>Granodiorite road-cuts (Makkah region). Split the bimodal joint population into the <b>Najd family</b> (NW–SE) and the <b>Red Sea family</b> (NE–SW) using circular statistics.</p><h4>Methods</h4><ul><li>Rayleigh test for non-uniformity</li><li>V-test against a predicted mean direction</li><li>von Mises fitting · mean resultant vector R̄</li></ul><h4>Table 1 — per-site summary</h4><table><tr><th>Site</th><th>n</th><th>R̄</th><th>p</th></tr><tr><td>S1</td><td class="tbc">[TBC]</td><td class="tbc">[TBC]</td><td class="tbc">[TBC]</td></tr><tr><td>S2</td><td class="tbc">[TBC]</td><td class="tbc">[TBC]</td><td class="tbc">[TBC]</td></tr></table><p style="font-size:12px;color:#9a4b30">⚠ Open item: joint count — draft cites 500, project HTML records 330.</p>`},

function addLock(el,type){

/* ---- group bonding ---- */
function gidNew(){ return 'g'+Date.now().toString(36)+Math.floor(Math.random()*1e4); }
function groupMembers(gid){ return gid?[...surface.querySelectorAll('[data-group="'+gid+'"]')]:[]; }
function updateBondUI(el){ const on=!!el.dataset.group; el.classList.toggle('bonded',on); const lb=el.querySelector('.win-lock'); if(lb) lb.innerHTML=on?LOCK_CLOSED:LOCK_OPEN; }
function setGroup(el,gid){ if(gid) el.dataset.group=gid; else el.removeAttribute('data-group'); updateBondUI(el); }
function bond(a,b){ if(!a||!b||a===b) return; const ga=a.dataset.group, gb=b.dataset.group; if(ga&&gb){ if(ga===gb) return; groupMembers(gb).forEach(m=>setGroup(m,ga)); } else if(ga){ setGroup(b,ga); } else if(gb){ setGroup(a,gb); } else { const g=gidNew(); setGroup(a,g); setGroup(b,g); } showToast('Locked together'); save(); }
function unbond(el){ const gid=el.dataset.group; if(!gid) return; setGroup(el,''); const rest=groupMembers(gid); if(rest.length===1) setGroup(rest[0],''); save(); }
function toggleBond(el){ if(el.dataset.group){ unbond(el); showToast('Unlocked'); } else { const n=findNeighbor(el); if(n) bond(el,n); else showToast('Snap it next to another window first'); } }
function findNeighbor(el){
  const l=parseFloat(el.style.left),t=parseFloat(el.style.top),w=el.offsetWidth,h=el.offsetHeight,r=l+w,b=t+h;
  let best=null,score=Infinity;
  allObjs().forEach(o=>{ if(o===el) return; if(o.dataset.group&&o.dataset.group===el.dataset.group) return;
    const ol=parseFloat(o.style.left),ot=parseFloat(o.style.top),ow=o.offsetWidth,oh=o.offsetHeight,or=ol+ow,ob=ot+oh;
    const ox=Math.min(r,or)-Math.max(l,ol), oy=Math.min(b,ob)-Math.max(t,ot);
    let s; if(ox>0&&oy>0) s=-(ox*oy); else { const gx=Math.max(0,Math.max(l-or,ol-r)), gy=Math.max(0,Math.max(t-ob,ot-b)); s=Math.hypot(gx,gy); if(s>16) return; }
    if(s<score){ score=s; best=o; }
  });
  return best;
}

/* shapes */
function hexA(hex,a){ hex=hex.replace('#',''); if(hex.length===3)hex=hex.split('').map(c=>c+c).join(''); const r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16); return `rgba(${r},${g},${b},${a})`; }
function lighten(hex,amt){ hex=hex.replace('#',''); if(hex.length===3)hex=hex.split('').map(c=>c+c).join(''); let r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16); r=Math.round(r+(255-r)*amt); g=Math.round(g+(255-g)*amt); b=Math.round(b+(255-b)*amt); return `rgb(${r},${g},${b})`; }
function lum(hex){ hex=hex.replace('#',''); if(hex.length===3)hex=hex.split('').map(c=>c+c).join(''); const r=parseInt(hex.substr(0,2),16)/255,g=parseInt(hex.substr(2,2),16)/255,b=parseInt(hex.substr(4,2),16)/255; return 0.2126*r+0.7152*g+0.0722*b; }
const SHEEN='linear-gradient(115deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.4) 18%, rgba(255,255,255,0) 38%, rgba(255,255,255,.22) 60%, rgba(255,255,255,0) 80%)';

  win.dataset.headercolor=color; bar.style.background=`${SHEEN}, linear-gradient(180deg, ${lighten(color,0.24)} 0%, ${color} 60%, ${lighten(color,0.08)} 100%)`; bar.style.boxShadow='inset 0 1px 0 rgba(255,255,255,.7), inset 0 -2px 4px rgba(0,0,0,.10)'; bar.style.borderBottomColor=hexA(color,0.5);
  const dark=lum(color)<0.55, t=dark?'#FFFFFF':'#2A2620';
  title.style.color=t; if(cat)cat.style.color=dark?'rgba(255,255,255,.78)':''; if(dot)dot.style.background=dark?'rgba(255,255,255,.85)':'rgba(0,0,0,.35)';
  win.querySelectorAll('.win-ctrls button').forEach(b=>b.style.color=dark?'#fff':'');
}
function shapeSVG(type,color){
  const fill=hexA(color,0.14), c=`vector-effect="non-scaling-stroke" stroke="${color}" stroke-width="2.5" fill="${fill}"`;
  if(type==='rect')    return `<svg viewBox="0 0 100 100" preserveAspectRatio="none"><rect x="3" y="3" width="94" height="94" rx="6" ${c}/></svg>`;
  if(type==='ellipse') return `<svg viewBox="0 0 100 100" preserveAspectRatio="none"><ellipse cx="50" cy="50" rx="47" ry="47" ${c}/></svg>`;
  if(type==='diamond') return `<svg viewBox="0 0 100 100" preserveAspectRatio="none"><polygon points="50,3 97,50 50,97 3,50" ${c}/></svg>`;
  return `<svg viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="4" y1="96" x2="96" y2="4" vector-effect="non-scaling-stroke" stroke="${color}" stroke-width="3" stroke-linecap="round"/></svg>`;
}
function createShape(type,opts={}){
  const color=opts.color||currentColor;

function recolorShape(el,color){ el.dataset.color=color; const old=el.querySelector('svg'); if(old){ const t=document.createElement('div'); t.innerHTML=shapeSVG(el.dataset.shape,color); el.replaceChild(t.firstChild, old); } }

/* images */
function readImage(file, cb){
  const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=1100; let w=img.width,h=img.height; if(w>max||h>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); } const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); const type=file.type==='image/png'?'image/png':'image/jpeg'; cb(cv.toDataURL(type, type==='image/jpeg'?0.82:undefined), w, h); }; img.src=r.result; };
  r.readAsDataURL(file);
}
function createImage(opts={}){
  let w=dim(opts.w,260), h=dim(opts.h, opts.natW?Math.round(260*opts.natH/opts.natW):190);
  const {sx,sy}=place(opts,w,h);

  el.innerHTML=`<img src="${opts.src}" draggable="false">`+`<div class="shape-del">×</div><div class="win-resize"></div>`;
  surface.appendChild(el);
  const del=el.querySelector('.shape-del');
  del.addEventListener('pointerdown',e=>e.stopPropagation());

function createPdf(opts={}){

/* import images / pdf / docx / text */
function importFiles(files, pt){ const c=pt||viewCenterSurface(); files.forEach((f,i)=>importOne(f,{left:c.x-150+i*24, top:c.y-110+i*24})); }
function importOne(f,at){
  const t=f.type||'', name=f.name||'file';
  if(t.startsWith('image/')){ readImage(f,(src,w,h)=>createImage({src,natW:w,natH:h,left:at.left,top:at.top})); return; }
  if(t==='application/pdf'||/\.pdf$/i.test(name)){ const r=new FileReader(); r.onload=()=>createPdf({src:r.result,title:name,left:at.left,top:at.top}); r.readAsDataURL(f); return; }
  if(/\.docx$/i.test(name)||t==='application/vnd.openxmlformats-officedocument.wordprocessingml.document'){ const r=new FileReader(); r.onload=async()=>{ try{ showToast('Reading Word file…'); if(!window.mammoth){ const ok=await loadFirst(['https://unpkg.com/mammoth/mammoth.browser.min.js','https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js','https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js']); if(!ok||!window.mammoth) throw new Error('mammoth'); } const res=await window.mammoth.convertToHtml({arrayBuffer:r.result},{styleMap:['u => u','strike => s']}); createNote({title:name.replace(/\.docx$/i,''), html:res.value||'<p></p>', left:at.left, top:at.top, w:420, h:340}); showToast('Imported with formatting'); }catch(err){ showToast('Could not load the Word converter (needs internet)'); } }; r.readAsArrayBuffer(f); return; }
  if(/\.doc$/i.test(name)||t==='application/msword'){ showToast('Old .doc isn’t supported — save it as .docx'); return; }
  if(t.startsWith('text/')||/\.(txt|md|markdown)$/i.test(name)){ const r=new FileReader(); r.onload=()=>{ const esc=String(r.result).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); createNote({title:name, html:'<p>'+esc.replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>')+'</p>', left:at.left, top:at.top, w:400, h:320}); }; r.readAsText(f); return; }
  showToast('Unsupported file: '+name);
}

/* remove object + its connectors */
function removeObject(el){
  if(el.dataset.group) unbond(el);
  const u=el.dataset.uid;
  for(let i=connectors.length-1;i>=0;i--){ if(connectors[i].from===u||connectors[i].to===u){ connectors[i].g.remove(); connectors.splice(i,1); } }
  if(selectedObj===el) selectedObj=null;
  if(linkSource===el){ linkSource=null; }
  const b=el.querySelector('.note-body'); if(b&&activeNote===b){activeNote=null;hideFmt();}
  el.remove(); deselectConn(); updateHint(); save(); renderFolders();
}

function bringToFront(el){ el.style.zIndex=++zTop; if(el.classList.contains('win')){ document.querySelectorAll('.win.focused').forEach(w=>w.classList.remove('focused')); el.classList.add('focused'); } }

function deselectAll(){ document.querySelectorAll('.selected').forEach(e=>e.classList.remove('selected')); selectedObj=null; }
function updateHint(){ const any=surface.querySelector('.win,.shape')||strokes.length||connectors.length; hint.classList.toggle('hide', !!any); }

/* ============ connectors ============ */
function objByUid(u){ return surface.querySelector('[data-uid="'+u+'"]'); }
function edgePoint(el,tx,ty){ const l=parseFloat(el.style.left),t=parseFloat(el.style.top),w=el.offsetWidth,h=el.offsetHeight; const cx=l+w/2,cy=t+h/2; let dx=tx-cx,dy=ty-cy; if(!dx&&!dy) return {x:cx,y:cy}; const sx=dx?(w/2)/Math.abs(dx):1e9, sy=dy?(h/2)/Math.abs(dy):1e9; const s=Math.min(sx,sy); return {x:cx+dx*s, y:cy+dy*s}; }
function center(el){ return {x:parseFloat(el.style.left)+el.offsetWidth/2, y:parseFloat(el.style.top)+el.offsetHeight/2}; }
function createConnector(from,to,color,push=true){
  const g=document.createElementNS(svgNS,'g');
  const hit=document.createElementNS(svgNS,'path'); hit.setAttribute('class','conn-hit');
  const line=document.createElementNS(svgNS,'path'); line.setAttribute('class','conn-line'); line.setAttribute('stroke',color||'#5C6B79'); line.setAttribute('stroke-width','2.4');
  g.appendChild(hit); g.appendChild(line); connLayer.insertBefore(g, connDel);
  const c={g,hit,line,from,to,color:color||'#5C6B79'};
  hit.addEventListener('pointerdown',e=>{ e.stopPropagation(); selectConn(c); });
  if(push) connectors.push(c);
  updateConnectors();
  if(push) save();
  return c;
}
function removeConnector(c){ c.g.remove(); const i=connectors.indexOf(c); if(i>=0) connectors.splice(i,1); if(selectedConn===c) deselectConn(); updateHint(); save(); }
function updateConnectors(){
  for(let i=connectors.length-1;i>=0;i--){ const c=connectors[i]; const a=objByUid(c.from), b=objByUid(c.to); if(!a||!b){ c.g.remove(); connectors.splice(i,1); continue; } const ca=center(a),cb=center(b); const p1=edgePoint(a,cb.x,cb.y), p2=edgePoint(b,ca.x,ca.y); const d=`M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`; c.hit.setAttribute('d',d); c.line.setAttribute('d',d); c.line.setAttribute('stroke',c.color); c.line.setAttribute('stroke-dasharray', c===selectedConn?'8 6':''); c.line.setAttribute('stroke-width', c===selectedConn?'3.2':'2.4'); if(c===selectedConn){ connDel.setAttribute('transform',`translate(${(p1.x+p2.x)/2},${(p1.y+p2.y)/2})`); } }
}
function selectConn(c){ deselectAll(); deselectConn(); selectedConn=c; connDel.style.display='block'; updateConnectors(); }
function deselectConn(){ if(selectedConn){ selectedConn=null; } connDel.style.display='none'; updateConnectors(); }

/* ============ drag / resize ============ */
function makeDraggable(el,handle,opts={}){
  let sx,sy,members=[],lead=null,active=false,snappedNow=false,matchObj=null;
  handle.addEventListener('pointerdown',e=>{
    if(currentTool!=='select') return;
    if(e.target.closest('.win-ctrls')||e.target.closest('.shape-del')||e.target.closest('.shape-lock')||e.target.closest('.lockbadge')) return;
    if(e.target.closest('.note-title') && e.target.isContentEditable) return;
    if(opts.onDown) opts.onDown(e);
    active=true; snappedNow=false; matchObj=null; handle.setPointerCapture(e.pointerId);
    sx=e.clientX; sy=e.clientY;
    const grp = el.dataset.group ? groupMembers(el.dataset.group) : [el];
    members = grp.map(m=>({el:m, ox:parseFloat(m.style.left), oy:parseFloat(m.style.top)}));
    lead = members.find(m=>m.el===el) || {el, ox:parseFloat(el.style.left), oy:parseFloat(el.style.top)};
    document.body.classList.add('is-dragging'); e.stopPropagation();
  });
  handle.addEventListener('pointermove',e=>{ if(!active) return;
    let nl=lead.ox+(e.clientX-sx)/view.z, nt=lead.oy+(e.clientY-sy)/view.z;
    if(snapEnabled){ const skip=members.map(m=>m.el); const sp=snapPos(el,nl,nt,skip); nl=sp.x; nt=sp.y; snappedNow=(sp.gx!=null||sp.gy!=null); matchObj=sp.match; showGuides(sp.gx,sp.gy); }
    const edx=nl-lead.ox, edy=nt-lead.oy;
    members.forEach(m=>{ m.el.style.left=(m.ox+edx)+'px'; m.el.style.top=(m.oy+edy)+'px'; });
    updateConnectors(); scheduleMini(); positionFmt();
  });
  handle.addEventListener('pointerup',()=>{ if(active){active=false; hideGuides(); document.body.classList.remove('is-dragging'); if(snappedNow&&lockOnSnap&&matchObj) bond(el,matchObj); save();} });
}
function snapPos(el,nl,nt,skip){
  const w=el.offsetWidth,h=el.offsetHeight, T=10/view.z;
  const L=nl,R=nl+w,C=nl+w/2, P=nt,B=nt+h,M=nt+h/2;
  let bx={d:T,adj:0,g:null,o:null}, by={d:T,adj:0,g:null,o:null};
  allObjs().forEach(o=>{ if(o===el) return; if(skip&&skip.indexOf(o)>=0) return;
    const oL=parseFloat(o.style.left),oW=o.offsetWidth,oR=oL+oW,oC=oL+oW/2;
    const oT=parseFloat(o.style.top),oH=o.offsetHeight,oB=oT+oH,oM=oT+oH/2;
    [[L,oL],[L,oR],[R,oL],[R,oR],[C,oC]].forEach(p=>{ const diff=p[1]-p[0]; if(Math.abs(diff)<bx.d){ bx={d:Math.abs(diff),adj:diff,g:p[1],o}; } });
    [[P,oT],[P,oB],[B,oT],[B,oB],[M,oM]].forEach(p=>{ const diff=p[1]-p[0]; if(Math.abs(diff)<by.d){ by={d:Math.abs(diff),adj:diff,g:p[1],o}; } });
  });
  return {x:nl+(bx.g!=null?bx.adj:0), y:nt+(by.g!=null?by.adj:0), gx:bx.g, gy:by.g, match: by.o||bx.o};
}
function showGuides(gx,gy){ const top=-view.y/view.z, bot=top+stage.clientHeight/view.z, left=-view.x/view.z, right=left+stage.clientWidth/view.z;
  if(gx!=null){ vGuide.setAttribute('x1',gx); vGuide.setAttribute('x2',gx); vGuide.setAttribute('y1',top); vGuide.setAttribute('y2',bot); vGuide.style.display='block'; } else vGuide.style.display='none';
  if(gy!=null){ hGuide.setAttribute('y1',gy); hGuide.setAttribute('y2',gy); hGuide.setAttribute('x1',left); hGuide.setAttribute('x2',right); hGuide.style.display='block'; } else hGuide.style.display='none';
}
function hideGuides(){ vGuide.style.display='none'; hGuide.style.display='none'; }
function makeResizable(el,handle,min={w:120,h:80}){
  let sx,sy,ow,oh,active=false;
  handle.addEventListener('pointerdown',e=>{ if(currentTool!=='select') return; e.stopPropagation(); active=true; handle.setPointerCapture(e.pointerId); sx=e.clientX; sy=e.clientY; ow=el.offsetWidth; oh=el.offsetHeight; document.body.classList.add('is-dragging'); });
  handle.addEventListener('pointermove',e=>{ if(!active) return; el.style.width=Math.max(min.w, ow+(e.clientX-sx)/view.z)+'px'; el.style.height=Math.max(min.h, oh+(e.clientY-sy)/view.z)+'px'; updateConnectors(); scheduleMini(); positionFmt(); });
  handle.addEventListener('pointerup',()=>{ if(active){active=false; document.body.classList.remove('is-dragging'); save();} });
}
function addEdgeResizers(el,min={w:120,h:80}){
  ['n','s','e','w','ne','nw','sw'].forEach(dir=>{
    const h=document.createElement('div'); h.className='rz rz-'+dir; el.appendChild(h);
    let sx,sy,ow,oh,ox,oy,active=false;
    h.addEventListener('pointerdown',e=>{ if(currentTool!=='select') return; e.stopPropagation(); active=true; h.setPointerCapture(e.pointerId);
      sx=e.clientX; sy=e.clientY; ow=el.offsetWidth; oh=el.offsetHeight; ox=parseFloat(el.style.left); oy=parseFloat(el.style.top); document.body.classList.add('is-dragging'); });
    h.addEventListener('pointermove',e=>{ if(!active) return; const dx=(e.clientX-sx)/view.z, dy=(e.clientY-sy)/view.z; let w=ow,ht=oh,l=ox,t=oy;
      if(dir.indexOf('e')>=0){ w=Math.max(min.w, ow+dx); }
      if(dir.indexOf('s')>=0){ ht=Math.max(min.h, oh+dy); }
      if(dir.indexOf('w')>=0){ w=Math.max(min.w, ow-dx); l=ox+(ow-w); }
      if(dir.indexOf('n')>=0){ ht=Math.max(min.h, oh-dy); t=oy+(oh-ht); }
      el.style.width=w+'px'; el.style.height=ht+'px'; el.style.left=l+'px'; el.style.top=t+'px'; updateConnectors(); scheduleMini(); positionFmt(); });
    h.addEventListener('pointerup',()=>{ if(active){active=false; document.body.classList.remove('is-dragging'); save();} });
  });

/* ============ drawer drag-out ============ */

/* ============ pen / eraser / pan / link ============ */
let drawing=false,erasing=false,panning=false,curPath=null,curPts=null,pSX,pSY,vSX,vSY;
function pathFrom(pts){ if(pts.length<2) return 'M '+pts[0].x+' '+pts[0].y; let d='M '+pts[0].x+' '+pts[0].y; for(let i=1;i<pts.length-1;i++){ const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2; d+=' Q '+pts[i].x+' '+pts[i].y+' '+mx+' '+my; } const L=pts[pts.length-1]; d+=' L '+L.x+' '+L.y; return d; }
function eraseAt(p){ const T=18; for(let i=strokes.length-1;i>=0;i--){ if(strokes[i].pts.some(q=>Math.hypot(q.x-p.x,q.y-p.y)<T)){ strokes[i].el.remove(); strokes.splice(i,1);} } updateHint(); }
function addStroke(pts,color,width){ const p=document.createElementNS(svgNS,'path'); p.setAttribute('fill','none'); p.setAttribute('stroke',color); p.setAttribute('stroke-width',width); p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round'); p.setAttribute('d',pathFrom(pts)); inkLayer.appendChild(p); return p; }

stage.addEventListener('pointerdown',e=>{
  if(currentTool==='pen'){ drawing=true; stage.setPointerCapture(e.pointerId); const p=screenToSurface(e.clientX,e.clientY); curPts=[p]; curPath=addStroke(curPts,currentColor,currentWidth); return; }
  if(currentTool==='eraser'){ erasing=true; stage.setPointerCapture(e.pointerId); eraseAt(screenToSurface(e.clientX,e.clientY)); return; }
  if(currentTool==='link'){ const o=e.target.closest('.win,.shape'); if(o) linkPick(o); else { if(linkSource){setLinkTarget(linkSource,false); linkSource=null;} } return; }
  if(e.target.closest('.win,.shape')) return;
  deselectAll(); deselectConn(); if(activeNote){activeNote=null; hideFmt();}
  panning=true; stage.classList.add('panning'); pSX=e.clientX; pSY=e.clientY; vSX=view.x; vSY=view.y; stage.setPointerCapture(e.pointerId);
});
stage.addEventListener('pointermove',e=>{
  if(drawing){ const p=screenToSurface(e.clientX,e.clientY); curPts.push(p); curPath.setAttribute('d',pathFrom(curPts)); return; }
  if(erasing){ eraseAt(screenToSurface(e.clientX,e.clientY)); return; }
  if(panning){ view.x=vSX+(e.clientX-pSX); view.y=vSY+(e.clientY-pSY); applyView(); }
});
stage.addEventListener('pointerup',()=>{
  if(drawing){ drawing=false; strokes.push({el:curPath,pts:curPts,color:currentColor,width:currentWidth}); curPath=null; updateHint(); save(); return; }
  if(erasing){ erasing=false; save(); return; }
  if(panning){ panning=false; stage.classList.remove('panning'); save(); }
});

function positionFmt(){

  const win=activeNoteWin(); if(!win) return;

const minimap=document.getElementById('minimap'), mmInner=document.getElementById('mmInner');
let miniReq=false;
function scheduleMini(){ if(miniReq) return; miniReq=true; requestAnimationFrame(()=>{ miniReq=false; renderMini(); }); }
function allObjs(){ return [...surface.querySelectorAll('.win,.shape')]; }
function contentBBox(){
  let xs=[],ys=[],xe=[],ye=[];
  allObjs().forEach(o=>{ const l=parseFloat(o.style.left),t=parseFloat(o.style.top); xs.push(l); ys.push(t); xe.push(l+o.offsetWidth); ye.push(t+o.offsetHeight); });
  strokes.forEach(s=>s.pts.forEach(p=>{ xs.push(p.x); ys.push(p.y); xe.push(p.x); ye.push(p.y); }));
  if(!xs.length) return null;
  const x=Math.min(...xs),y=Math.min(...ys),X=Math.max(...xe),Y=Math.max(...ye);
  return {x,y,w:Math.max(40,X-x),h:Math.max(40,Y-y)};
}
function renderMini(){
  if(minimap.classList.contains('hidden')) return;
  const bb=contentBBox(); mmInner.innerHTML='';
  const W=minimap.clientWidth, H=minimap.clientHeight, pad=10;
  const r=stage.getBoundingClientRect();
  const vx=-view.x/view.z, vy=-view.y/view.z, vw=r.width/view.z, vh=r.height/view.z;
  let bx=bb?bb.x:vx, by=bb?bb.y:vy, bX=bb?bb.x+bb.w:vx+vw, bY=bb?bb.y+bb.h:vy+vh;
  bx=Math.min(bx,vx); by=Math.min(by,vy); bX=Math.max(bX,vx+vw); bY=Math.max(bY,vy+vh);
  const bw=Math.max(1,bX-bx), bh=Math.max(1,bY-by);
  const s=Math.min((W-pad*2)/bw,(H-pad*2)/bh);
  const offx=(W-bw*s)/2, offy=(H-bh*s)/2;
  mmInner._map={bx,by,s,offx,offy};
  allObjs().forEach(o=>{ const d=document.createElement('div'); d.className='mm-item '+(o.dataset.kind||''); d.style.left=(offx+(parseFloat(o.style.left)-bx)*s)+'px'; d.style.top=(offy+(parseFloat(o.style.top)-by)*s)+'px'; d.style.width=Math.max(2,o.offsetWidth*s)+'px'; d.style.height=Math.max(2,o.offsetHeight*s)+'px'; mmInner.appendChild(d); });
  const v=document.createElement('div'); v.className='mm-view'; v.style.left=(offx+(vx-bx)*s)+'px'; v.style.top=(offy+(vy-by)*s)+'px'; v.style.width=(vw*s)+'px'; v.style.height=(vh*s)+'px'; mmInner.appendChild(v);
}
minimap.addEventListener('click',e=>{ if(e.target.closest('#mmX')) return; const m=mmInner._map; if(!m) return; const rect=minimap.getBoundingClientRect(); const mx=e.clientX-rect.left, my=e.clientY-rect.top; const surfX=m.bx+(mx-m.offx)/m.s, surfY=m.by+(my-m.offy)/m.s; const r=stage.getBoundingClientRect(); view.x=r.width/2-surfX*view.z; view.y=r.height/2-surfY*view.z; applyView(); save(); });
document.getElementById('mmX').addEventListener('click',e=>{ e.stopPropagation(); minimap.classList.add('hidden'); document.getElementById('mmToggle').style.display='block'; });
document.getElementById('mmToggle').addEventListener('click',()=>{ minimap.classList.remove('hidden'); document.getElementById('mmToggle').style.display='none'; renderMini(); });

function frameAll(){ const bb=contentBBox(); if(!bb){ centerView(); return; } const r=stage.getBoundingClientRect(); const pad=80; const z=Math.min(2.2, Math.min((r.width-pad)/bb.w,(r.height-pad)/bb.h)); view.z=Math.max(0.18,z); view.x=r.width/2-(bb.x+bb.w/2)*view.z; view.y=r.height/2-(bb.y+bb.h/2)*view.z; applyView(); save(); }

const boardsEl=document.getElementById('boards');

function serializeBoard(){
  const objs=[];
  surface.querySelectorAll('.win,.shape').forEach(o=>{
    const g={uid:o.dataset.uid,left:parseFloat(o.style.left),top:parseFloat(o.style.top),w:parseFloat(o.style.width)||o.offsetWidth,h:parseFloat(o.style.height)||o.offsetHeight,min:o.classList.contains('min'),group:o.dataset.group||''};
    const k=o.dataset.kind;
    if(k==='note'){ const b=o.querySelector('.note-body'); objs.push({kind:'note',title:o.querySelector('.note-title').innerHTML,html:b.innerHTML,headerColor:o.dataset.headercolor||'',libColor:o.dataset.libColor||'',libGlow:o.dataset.libGlow==='1',bodyStyle:{fontFamily:b.style.fontFamily,fontSize:b.style.fontSize,color:b.style.color},...g}); }
    else if(k==='doc'){ objs.push({kind:'doc',id:o.dataset.tid,...g}); }
    else if(k==='embed'){ objs.push({kind:'embed',url:o.dataset.url,title:o.querySelector('.win-title').textContent,...g}); }
    else if(k==='pdf'){ objs.push({kind:'pdf',src:o.dataset.src,title:o.querySelector('.win-title').textContent,...g}); }
    else if(k==='image'){ objs.push({kind:'image',src:o.querySelector('img').src,...g}); }
    else if(k==='shape'){ objs.push({kind:'shape',shape:o.dataset.shape,color:o.dataset.color,...g}); }
  });
  const conns=connectors.map(c=>({from:c.from,to:c.to,color:c.color}));
  const ink=strokes.map(s=>({color:s.color,width:s.width,pts:s.pts}));
  return {name:boards[currentBoard]?boards[currentBoard].name:'Board', objs, conns, ink, view:{...view}};
}
function clearSurface(){ surface.querySelectorAll('.win,.shape').forEach(o=>o.remove()); connectors.forEach(c=>c.g.remove()); connectors=[]; strokes.forEach(s=>s.el.remove()); strokes=[]; selectedObj=null; selectedConn=null; activeNote=null; linkSource=null; hideFmt(); connDel.style.display='none'; }
function loadBoardData(d){
  restoring=true; clearSurface();
  (d.objs||[]).forEach(o=>{
    if(o.kind==='doc') openItem(o.id,o);
    else if(o.kind==='note') createNote(o);
    else if(o.kind==='embed') createEmbed(o);
    else if(o.kind==='pdf') createPdf(o);
    else if(o.kind==='image') createImage(o);
    else if(o.kind==='shape') createShape(o.shape,o);
  });

  (d.ink||[]).forEach(s=>{ const el=addStroke(s.pts,s.color,s.width); strokes.push({el,pts:s.pts,color:s.color,width:s.width}); });
  if(d.view){ view={...d.view}; applyView(); }

function persist(){ if(restoring) return; try{ if(currentBoard) boards[currentBoard]=serializeBoard(); localStorage.setItem(SAVE_KEY, JSON.stringify({boards,order:boardOrder,current:currentBoard,settings:{snap:snapEnabled,lockSnap:lockOnSnap,theme:currentTheme,notesLib:notesLibColor,logo:logoVariant,logoA:logoA}})); }catch(e){ if(e&&e.name==='QuotaExceededError'&&!quotaWarned){ quotaWarned=true; showToast('Storage full — large images/PDFs may not be saved'); } } }
const save=persist;
function load(){ try{ const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false; const d=JSON.parse(raw); if(!d.order||!d.order.length) return false; if(d.settings){ snapEnabled=d.settings.snap!==false; lockOnSnap=!!d.settings.lockSnap; applyTheme(d.settings.theme); if(d.settings.notesLib) notesLibColor=d.settings.notesLib; if(d.settings.logo!=null) logoVariant=d.settings.logo; } renderLogo(); updateSnapBtn(); updateLockSnapBtn(); boards=d.boards||{}; boardOrder=d.order; currentBoard=d.current&&boards[d.current]?d.current:boardOrder[0]; loadBoardData(boards[currentBoard]||{}); renderBoards(); return true; }catch(e){ return false; } }

/* ============ deep links + vault manifest ============ */
function applyDeepLinks(){
  const p=new URLSearchParams(location.search);
  (p.get('recall')||'').split(',').filter(Boolean).forEach(n=>recalled.add(n));
  const ids=(p.get('open')||'').split(',').filter(Boolean);
  ids.forEach(id=>{ const it=itemById[id]; if(it){ recalled.add(it.folder); openItem(id); } });
  renderFolders();
  if(ids.length && typeof frameAll==='function') setTimeout(frameAll,60);
}
function initAtlasContent(){
  fetch('atlas.content.json')
    .then(r=>r.ok?r.json():null)
    .then(data=>{ if(Array.isArray(data)&&data.length){ FOLDERS=data; rebuildIndex(); renderFolders(); applyDeepLinks(); } })
    .catch(()=>{});
}

/* ============ init ============ */
function centerView(){ const r=stage.getBoundingClientRect(); view={x:r.width/2-SURF_W/2, y:r.height/2-SURF_H/2, z:1}; applyView(); }
renderFolders();
if(!load()){
  const id=newBoardId(); boards[id]={name:'Board 1', objs:[], conns:[], ink:[], view:{x:0,y:0,z:1}}; boardOrder=[id]; currentBoard=id;
  centerView(); boards[id].view={...view};
  renderBoards();
  const starter=itemById['nfs-roadmap']?'nfs-roadmap':(itemById['nfs-brief']?'nfs-brief':null);
  if(starter) openItem(starter);
}
applyDeepLinks();
initAtlasContent();
updateHint(); applyTheme(currentTheme); renderLogo(); renderMini();
window.addEventListener('resize',()=>{ positionFmt(); renderMini(); });
</script>
</body>
